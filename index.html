<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <h1 id="app-title">Assessment Tool</h1>
            <div class="progress-bar-bg" id="progress-container">
                <div class="progress-bar-fill" id="progress-fill" style="width: 0%;"></div>
            </div>
        </header>

        <main id="assessment-view">
            <div id="category-title-area">
                <h2 id="current-category-title">Loading...</h2>
            </div>
            
            <div id="question-area"></div>

            <div class="navigation-buttons">
                <button id="btn-prev" disabled>Previous</button>
                <button id="btn-next">Next</button>
                <button id="btn-submit" style="display: none;">Submit Assessment</button>
            </div>
        </main>

        <section id="results-view" style="display: none;">
            <h2>Your Assessment Dashboard</h2>
            
            <div id="score-breakdown-area"></div>
            
            <div class="dashboard-actions">
                <button id="btn-print" onclick="window.print()">Save Results as PDF</button>
            </div>
        </section>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
